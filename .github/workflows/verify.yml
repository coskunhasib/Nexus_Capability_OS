name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate packets and trials
        run: npm run validate:packets

      - name: Audit registry
        run: npm run audit:registry

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Sync generated tree artifact
        run: |
          if ! git diff --quiet -- src/generated-tree-data.ts || [ -n "$(git ls-files --others --exclude-standard -- src/generated-tree-data.ts)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/generated-tree-data.ts
            git commit -m "ci: track generated tree data"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Check generated artifacts
        run: npm run check:generated

      - name: Write CI summary
        run: npm run summary:ci
