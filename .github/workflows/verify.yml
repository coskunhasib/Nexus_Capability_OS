name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Validate packets and trials
        run: npm run validate:packets

      - name: Audit registry
        run: npm run audit:registry

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
