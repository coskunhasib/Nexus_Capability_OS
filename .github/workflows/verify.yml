name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate packets and trials
        run: npm run validate:packets

      - name: Audit registry
        run: npm run audit:registry

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Check generated artifacts
        run: npm run check:generated

      - name: Write CI summary
        run: npm run summary:ci
